<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geovisor - Función Intersect</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Análisis de Intersección de Proyectos</h1>
    </header>

    <div class="container">
        <div id="sidebar">
            <h3>Herramientas de Análisis</h3>
            
            <div class="control-group">
                <label for="upload-kml"><b>1. Subir archivo KML:</b></label>
                <input type="file" id="upload-kml" accept=".kml">
            </div>

            <hr>

            <div class="control-group">
                <p>Usa este botón para limpiar el mapa y realizar un nuevo análisis.</p>
                <button id="btn-limpiar">Limpiar Mapa</button>
            </div>
            
            <div id="resultados">
                </div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://unpkg.com/@mapbox/togeojson@0.16.0/togeojson.js"></script>
    
    <script src="index.js"></script>
</body>
</html>
