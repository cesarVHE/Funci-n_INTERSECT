<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geovisor - Análisis de Intersección</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-container">
        <h1>Análisis de Intersección</h1>
        <h3>Herramientas</h3>
        <p>Sube un archivo KML para verificar traslapes con los polígonos del proyecto.</p>
        
        <div class="control-group">
            <label for="upload-kml"><b>1. Seleccionar archivo KML:</b></label>
            <input type="file" id="upload-kml" accept=".kml">
        </div>

        <button id="btn-limpiar">Limpiar Mapa</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://unpkg.com/@mapbox/togeojson@0.16.0/togeojson.js"></script>
    
    <script src="index.js"></script>
</body>
</html>
